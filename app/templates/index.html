<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Secure Auth | Passwordless MFA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <style>
        body { background: radial-gradient(circle at top left, #f8fafc, #e2e8f0); min-height: 100vh; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Secure Access Port</h1>
            <p class="text-slate-500 text-sm mt-2">Biometric + TOTP Multi-Factor Gateway</p>
        </div>

        <div id="auth-section" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Identity handle</label>
                <input type="text" id="username" placeholder="e.g. employee_01" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-700">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="register()" class="bg-slate-800 hover:bg-black text-white font-semibold py-3 rounded-xl active:scale-95 transition-all">Register</button>
                <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl active:scale-95 transition-all shadow-md shadow-blue-100">Login</button>
            </div>
        </div>

        <div id="totp-section" class="hidden space-y-4 mt-4 border-t pt-6">
            <div class="text-center">
                <p class="text-sm text-slate-600 mb-4">Enter the 6-digit code from your Authenticator App</p>
                <input type="text" id="totp-code" placeholder="000 000" maxlength="6"
                    class="w-full px-4 py-4 rounded-xl border-2 border-blue-100 text-center text-3xl tracking-[0.5em] font-mono focus:border-blue-500 outline-none transition-all">
                <button onclick="verifyMFA()" 
                    class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl active:scale-95 transition-all">
                    Verify & Enter
                </button>
            </div>
        </div>

        <div id="qr-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center">
                <h2 class="text-xl font-bold mb-2">Setup Authenticator</h2>
                <p class="text-xs text-slate-500 mb-4">Scan this QR code with Google Authenticator or Authy to link your account.</p>
                <img id="qr-display" class="mx-auto border-4 border-slate-50 p-2 rounded-lg mb-6" src="">
                <button onclick="closeQR()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Done</button>
            </div>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-medium hidden"></div>
        
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold tracking-widest">MFA Verification Layer v2.0</p>
        </div>
    </div>

    <script>
        const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;
        let globalStartTime = 0;
        let currentUsername = "";

        function updateStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `mt-6 text-center text-sm font-medium ${isError ? 'text-red-500' : 'text-blue-600'}`;
            el.classList.remove('hidden');
        }

        async function register() {
            const username = document.getElementById('username').value;
            if (!username) return updateStatus("Username required", true);
            
            updateStatus("Initializing Biometrics...");
            try {
                const resp = await fetch(`/generate-registration-options?username=${username}`);
                const options = await resp.json();
                const attestation = await startRegistration({ optionsJSON: options });

                const verifyResp = await fetch('/verify-registration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, attestation }),
                });

                const result = await verifyResp.json();
                if (result.verified && result.totp_qr) {
                    // Show the QR code for MFA setup
                    document.getElementById('qr-display').src = `data:image/png;base64,${result.totp_qr}`;
                    document.getElementById('qr-modal').classList.remove('hidden');
                    updateStatus("Step 1 Complete: Now link your Authenticator app.");
                }
            } catch (error) {
                updateStatus(error.message, true);
            }
        }

        async function login() {
            globalStartTime = performance.now();
            currentUsername = document.getElementById('username').value;
            if (!currentUsername) return updateStatus("Enter username", true);

            updateStatus("Waiting for Hardware Signature...");
            try {
                const resp = await fetch(`/generate-authentication-options?username=${currentUsername}`);
                if (!resp.ok) throw new Error("Account not found");
                
                const options = await resp.json();
                const assertion = await startAuthentication({ optionsJSON: options });

                const verifyResp = await fetch('/verify-authentication', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUsername, authentication: assertion }),
                });

                const result = await verifyResp.json();
                if (result.requires_totp) {
                    updateStatus("Biometrics Verified. Step 2: TOTP Code required.");
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('totp-section').classList.remove('hidden');
                    document.getElementById('totp-code').focus();
                } else if (result.verified) {
                    completeAuthRedirect();
                }
            } catch (error) {
                updateStatus(error.message, true);
            }
        }

        async function verifyMFA() {
            const code = document.getElementById('totp-code').value;
            if (code.length < 6) return updateStatus("Enter 6-digit code", true);

            updateStatus("Finalizing Secure Session...");
            const resp = await fetch('/verify-totp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername, code: code }),
            });

            const result = await resp.json();
            if (result.success) {
                completeAuthRedirect();
            } else {
                updateStatus("Invalid MFA Code", true);
            }
        }

        function completeAuthRedirect() {
            const duration = ((performance.now() - globalStartTime) / 1000).toFixed(2);
            localStorage.setItem('auth_speed', duration);
            window.location.href = "/dashboard";
        }

        function closeQR() {
            document.getElementById('qr-modal').classList.add('hidden');
            updateStatus("Account Setup Complete. You can now login.");
        }
    </script>
</body>
</html>
